<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .welcome-section {
            text-align: center;
        }

        .welcome-section p {
            margin: 20px 0;
            line-height: 1.6;
            color: #555;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .login-section {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .error {
            color: #e74c3c;
            font-size: 0.9em;
            margin-top: 10px;
            display: none;
        }

        .back-btn {
            background: #95a5a6;
            margin-right: 10px;
        }

        .back-btn:hover {
            background: #7f8c8d;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sección de Bienvenida -->
        <div class="welcome-section" id="welcomeSection">
            <h1>🚀 Panel Web</h1>
            <p class="subtitle">Sistema de gestión completo</p>
            <p>Bienvenido a nuestro panel de gestión. Aquí podrás administrar perfiles, publicar anuncios y mucho más.</p>
            <p>Inicia sesión para acceder a todas las funcionalidades disponibles según tu rol.</p>
            <button class="btn" onclick="showLogin()">Iniciar Sesión</button>
        </div>

        <!-- Sección de Login -->
        <div class="login-section" id="loginSection">
            <h1>Iniciar Sesión</h1>
            <p class="subtitle">Ingresa tus credenciales</p>
            
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="ejemplo@correo.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <div class="error" id="errorMsg"></div>
                
                <div class="btn-group">
                    <button type="button" class="btn back-btn" onclick="showWelcome()">Volver</button>
                    <button type="submit" class="btn">Entrar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Inicializar datos si no existen
        if (!localStorage.getItem('users')) {
            const initialData = {
                users: [
                   { 
                    }
                ],
                announcements: [
                    {
                        id: 1,
                        title: '¡Bienvenido al Panel!',
                        content: 'Este es tu primer anuncio. Los admins pueden crear más.',
                        author: 'Sistema',
                        date: new Date().toISOString()
                    }
                ]
            };
            
            localStorage.setItem('users', JSON.stringify(initialData.users));
            localStorage.setItem('announcements', JSON.stringify(initialData.announcements));
        }

        function showLogin() {
            document.getElementById('welcomeSection').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
        }

        function showWelcome() {
            document.getElementById('welcomeSection').style.display = 'block';
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            const users = JSON.parse(localStorage.getItem('users'));
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                // Guardar sesión
                localStorage.setItem('currentUser', JSON.stringify(user));
                // Redirigir al panel
                window.location.href = 'panel.html';
            } else {
                errorMsg.textContent = '❌ Correo o contraseña incorrectos';
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
